<!DOCTYPE html>
<html data-theme="dark">

<head>
    <meta charset="UTF-8">
    <title>Async Recorder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ===========================================
           Reset & Base
           =========================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            background: transparent;
            overflow: hidden;
            height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #f7f7f7;
            -webkit-app-region: drag;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        button, input, .display-dropdown {
            -webkit-app-region: no-drag;
        }

        /* ===========================================
           Floating Bar
           =========================================== */
        .floating-bar {
            display: inline-flex;
            align-items: center;
            padding: 8px 12px;
            gap: 6px;
            height: 52px;
            margin: 0 auto 6px;
            background: rgba(30, 30, 30, 0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            box-shadow:
                0 2px 8px rgba(0, 0, 0, 0.2),
                0 12px 40px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
        }

        /* ===========================================
           Close Button
           =========================================== */
        .bar-close {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            padding: 0;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .bar-close:hover {
            opacity: 0.9;
        }

        .bar-close img {
            width: 18px;
            height: 18px;
        }

        /* ===========================================
           Divider
           =========================================== */
        .bar-divider {
            width: 1px;
            height: 28px;
            background: rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        /* ===========================================
           Source Toggle Pills
           =========================================== */
        .bar-sources {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .source-pill {
            display: flex;
            align-items: center;
            padding: 6px 10px;
            gap: 6px;
            height: 36px;
            border: none;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            transition: background 0.3s;
            flex-shrink: 0;
            font-family: inherit;
        }

        .source-pill:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .source-pill .source-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            filter: brightness(0) invert(0.6);
            transition: filter 0.2s;
        }

        .source-pill.active .source-icon {
            filter: brightness(0) invert(1);
        }

        .source-pill .source-label {
            font-size: 12.5px;
            font-weight: 500;
            line-height: 1;
            letter-spacing: -0.02em;
            color: #969696;
            white-space: nowrap;
            display: inline-block;
            width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: left;
            transition: color 0.2s;
        }

        .source-pill.active .source-label {
            color: #FFFFFF;
        }

        .source-pill.active {
            background: rgba(255, 255, 255, 0.06);
        }

        .source-pill.disabled {
            opacity: 0.4;
            cursor: default;
            pointer-events: none;
        }

        /* ===========================================
           Display Selector
           =========================================== */
        .display-pill {
            display: flex;
            align-items: center;
            padding: 6px 10px;
            gap: 6px;
            height: 36px;
            border: none;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
            font-family: inherit;
        }

        .display-pill:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .display-pill .source-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            filter: brightness(0) invert(1);
        }

        .display-pill .display-label {
            font-size: 12.5px;
            font-weight: 500;
            line-height: 1;
            letter-spacing: -0.02em;
            color: #FFFFFF;
            white-space: nowrap;
            display: inline-block;
            width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: left;
        }

        .display-pill .chevron-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .display-selector.open .chevron-icon {
            transform: rotate(180deg);
        }

        /* ===========================================
           Display Dropdown (opens upward)
           =========================================== */
        .display-selector {
            position: relative;
            flex-shrink: 0;
        }

        .display-dropdown {
            display: none;
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(36, 36, 36, 0.95);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            min-width: 180px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.45);
            z-index: 100;
            overflow: hidden;
            flex-direction: column;
            -webkit-app-region: no-drag;
        }

        .display-dropdown.visible {
            display: flex;
        }

        .display-dropdown-item {
            padding: 8px 14px;
            color: #969696;
            font-size: 12.5px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.15s;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
            white-space: nowrap;
        }

        .display-dropdown-item:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #f7f7f7;
        }

        .display-dropdown-item.selected {
            color: #FFFFFF;
        }

        .display-dropdown-item .check-mark {
            width: 14px;
            flex-shrink: 0;
            text-align: center;
            color: #FF4000;
        }

        /* ===========================================
           Record / Stop Buttons
           =========================================== */
        .record-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 20px;
            gap: 4px;
            height: 36px;
            border: none;
            border-radius: 10px;
            background: #FF4000;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            line-height: 1;
            letter-spacing: -0.02em;
            color: #FFFFFF;
            white-space: nowrap;
            transition: background 0.15s;
            flex-shrink: 0;
            box-shadow: 0 1px 8px rgba(255, 64, 0, 0.15);
        }

        .record-btn:hover:not(:disabled) {
            background: #CC2B02;
        }

        .record-btn:active:not(:disabled) {
            background: #CC2B02;
        }

        .record-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .record-btn.loading {
            pointer-events: none;
            position: relative;
            color: transparent;
        }

        .record-btn.loading::after {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }


        /* ===========================================
           Status Badge (visible during recording)
           =========================================== */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.15);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .status-badge .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
            animation: pulse 1s infinite;
        }

        .status-badge.starting {
            color: #f59e0b;
            background: rgba(245, 158, 11, 0.15);
        }

        /* ===========================================
           Rename Row (inline, shown after recording)
           =========================================== */
        .bar-rename {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
            min-width: 0;
        }

        .rename-input {
            flex: 1;
            min-width: 0;
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #f7f7f7;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .rename-input:focus {
            border-color: #FF4000;
        }

        .rename-input::placeholder {
            color: #969696;
        }

        .rename-save {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FF4000;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            flex-shrink: 0;
            font-size: 14px;
            transition: filter 0.2s;
        }

        .rename-save:hover {
            filter: brightness(1.1);
        }


        /* ===========================================
           Recording State
           =========================================== */
        .floating-bar.recording {
            padding: 8px 10px;
            gap: 8px;
            height: 52px;
            border-radius: 14px;
            background: rgba(36, 36, 36, 0.92);
            border: 1px solid #3C3C3C;
            box-shadow:
                0 2px 8px rgba(0, 0, 0, 0.2),
                0 12px 40px rgba(0, 0, 0, 0.25);
        }

        .floating-bar.recording .bar-close,
        .floating-bar.recording #btn-start-session,
        .floating-bar.recording #renameRow {
            display: none;
        }

        /* Source pills: icon-only in recording */
        .floating-bar.recording .source-label {
            display: none;
        }

        .floating-bar.recording .source-pill {
            padding: 6px;
            gap: 0;
            height: 36px;
            width: 36px;
            justify-content: center;
            border-radius: 8px;
        }

        .floating-bar.recording .source-pill .source-icon {
            width: 18px;
            height: 18px;
        }

        .floating-bar.recording .source-pill.disabled {
            opacity: 1;
            pointer-events: auto;
            cursor: pointer;
        }

        /* Display pill: icon-only in recording (hide label, chevron, dropdown) */
        .floating-bar.recording .display-label,
        .floating-bar.recording .chevron-icon,
        .floating-bar.recording .display-dropdown {
            display: none !important;
        }

        .floating-bar.recording .display-pill {
            padding: 6px;
            gap: 0;
            height: 36px;
            width: 36px;
            justify-content: center;
            border-radius: 8px;
        }

        .floating-bar.recording .display-pill .source-icon {
            width: 18px;
            height: 18px;
            transition: filter 0.2s;
        }

        .floating-bar.recording .display-pill:not(.active) .source-icon {
            filter: brightness(0) invert(0.4);
        }

        /* Status badge: left side with timer */
        .floating-bar.recording #statusBadge {
            order: -1;
        }

        .floating-bar.recording .status-badge {
            background: none;
            padding: 0 4px;
            gap: 6px;
            color: #FD5337;
            font-size: 14px;
            font-weight: 600;
        }

        .floating-bar.recording .status-dot {
            width: 8px;
            height: 8px;
        }

        .floating-bar.recording .bar-divider {
            height: 32px;
        }

        /* Recording action buttons */
        .bar-action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: transparent;
            cursor: pointer;
            flex-shrink: 0;
            transition: opacity 0.2s;
            padding: 0;
        }

        .bar-action-btn:hover {
            opacity: 0.8;
        }

        .bar-action-btn img {
            width: 32px;
            height: 32px;
        }

        .bar-action-btn svg {
            width: 18px;
            height: 18px;
        }

        .bar-action-btn.disabled {
            opacity: 0.25;
            cursor: default;
            pointer-events: none;
        }

        /* ===========================================
           Animations
           =========================================== */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===========================================
           Utility
           =========================================== */
        .hidden { display: none !important; }
    </style>
</head>

<body>
    <div id="mainApp" class="floating-bar">

        <!-- Close Button -->
        <button id="btn-close" class="bar-close" title="Hide bar">
            <img src="img/cancel.png" alt="Close" width="24" height="24">
        </button>

        <div class="bar-divider"></div>

        <!-- Source Toggles -->
        <div class="bar-sources">
            <button id="toggle-camera" class="source-pill" data-source="camera">
                <img class="source-icon" src="img/camera_off.png" data-off="img/camera_off.png" data-on="img/camera_on.png" width="16" height="16" alt="">
                <span class="source-label" data-off="No camera" data-on="Camera">No camera</span>
            </button>
            <button id="toggle-mic" class="source-pill" data-source="mic">
                <img class="source-icon" src="img/mic_off.png" data-off="img/mic_off.png" data-on="img/mic_on.png" width="16" height="16" alt="">
                <span class="source-label" data-off="No mic" data-on="Mic">loading...</span>
            </button>
            <button id="toggle-audio" class="source-pill" data-source="audio">
                <img class="source-icon" src="img/audio_off.png" data-off="img/audio_off.png" data-on="img/audio_on.png" width="16" height="16" alt="">
                <span class="source-label" data-off="No audio" data-on="Audio">loading...</span>
            </button>
        </div>

        <div class="bar-divider"></div>

        <!-- Display Selector -->
        <div id="displaySelector" class="display-selector">
            <button id="toggle-screen" class="display-pill">
                <img class="source-icon" src="img/screen_on.png" width="16" height="16" alt="">
                <span id="displayLabel" class="display-label">Select display</span>
                <svg class="chevron-icon" width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 7.5L10 12.5L15 7.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div id="displayDropdown" class="display-dropdown"></div>
        </div>

        <!-- Status Badge (hidden default, shown during recording) -->
        <div id="statusBadge" class="status-badge hidden">
            <div class="status-dot"></div>
            <span id="statusText">Ready</span>
        </div>

        <!-- Record / Stop / Delete -->
        <button id="btn-start-session" class="record-btn" title="Start Recording">
            <span>Start Recording</span>
        </button>
        <button id="btn-stop-session" class="bar-action-btn hidden" title="Stop Recording">
            <img src="img/stop.png" alt="Stop">
        </button>
        <button id="btn-delete-session" class="bar-action-btn disabled hidden" title="Discard recording">
            <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15.5 4.5H13V3.5C13 3.102 12.842 2.72 12.561 2.439C12.28 2.158 11.898 2 11.5 2H8.5C8.102 2 7.72 2.158 7.439 2.439C7.158 2.72 7 3.102 7 3.5V4.5H4.5C4.367 4.5 4.24 4.553 4.146 4.646C4.053 4.74 4 4.867 4 5C4 5.133 4.053 5.26 4.146 5.354C4.24 5.447 4.367 5.5 4.5 5.5H5V15C5 15.265 5.105 15.52 5.293 15.707C5.48 15.895 5.735 16 6 16H14C14.265 16 14.52 15.895 14.707 15.707C14.895 15.52 15 15.265 15 15V5.5H15.5C15.633 5.5 15.76 5.447 15.854 5.354C15.947 5.26 16 5.133 16 5C16 4.867 15.947 4.74 15.854 4.646C15.76 4.553 15.633 4.5 15.5 4.5ZM8 3.5C8 3.367 8.053 3.24 8.146 3.146C8.24 3.053 8.367 3 8.5 3H11.5C11.633 3 11.76 3.053 11.854 3.146C11.947 3.24 12 3.367 12 3.5V4.5H8V3.5ZM14 15H6V5.5H14V15ZM8.5 8V12.5C8.5 12.633 8.447 12.76 8.354 12.854C8.26 12.947 8.133 13 8 13C7.867 13 7.74 12.947 7.646 12.854C7.553 12.76 7.5 12.633 7.5 12.5V8C7.5 7.867 7.553 7.74 7.646 7.646C7.74 7.553 7.867 7.5 8 7.5C8.133 7.5 8.26 7.553 8.354 7.646C8.447 7.74 8.5 7.867 8.5 8ZM12.5 8V12.5C12.5 12.633 12.447 12.76 12.354 12.854C12.26 12.947 12.133 13 12 13C11.867 13 11.74 12.947 11.646 12.854C11.553 12.76 11.5 12.633 11.5 12.5V8C11.5 7.867 11.553 7.74 11.646 7.646C11.74 7.553 11.867 7.5 12 7.5C12.133 7.5 12.26 7.553 12.354 7.646C12.447 7.74 12.5 7.867 12.5 8Z" fill="white"/>
            </svg>
        </button>

        <!-- Rename Row (hidden, shown after recording stops) -->
        <div id="renameRow" class="bar-rename hidden">
            <input type="text" id="renameInput" class="rename-input" placeholder="Name this recording..." maxlength="100">
            <button id="renameSaveBtn" class="rename-save" title="Save">&#10003;</button>
        </div>

    </div>



    <script type="module" src="./renderer.js"></script>
</body>

</html>
