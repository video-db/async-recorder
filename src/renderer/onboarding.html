<!DOCTYPE html>
<html data-theme="dark">

<head>
    <meta charset="UTF-8">
    <title>Welcome — Async Recorder</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        /* Theme Variables */
        [data-theme="dark"] {
            --bg-primary: #0c0c0d;
            --bg-secondary: #151515;
            --bg-surface: #1b1b21;
            --bg-hover: #242424;
            --border: #2d2d2d;
            --border-light: #44454c;
            --text-primary: #f7f7f7;
            --text-secondary: #969696;
            --text-muted: #525252;
            --accent: #ff4d00;
            --accent-hover: #ff9061;
            --error: #ef4444;
        }

        [data-theme="light"] {
            --bg-primary: #faf9f7;
            --bg-secondary: #ffffff;
            --bg-surface: #f0eeeb;
            --bg-hover: #e6e4e0;
            --border: #d9d6d0;
            --border-light: #c9c5be;
            --text-primary: #0c0c0d;
            --text-secondary: #4d4d4d;
            --text-muted: #919191;
            --accent: #e25612;
            --accent-hover: #c14103;
            --error: #dc2626;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            -webkit-app-region: drag;
        }

        button, input, a, label { -webkit-app-region: no-drag; }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            padding: 40px 32px 24px;
        }

        .onboarding-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        .brand-logo {
            height: 24px;
            border-radius: 5px;
        }

        .brand-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .onboarding-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .input-group {
            margin-bottom: 10px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .label-link {
            font-size: 10px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .label-link:hover { text-decoration: underline; }

        .modal-input {
            width: 100%;
            padding: 8px 10px;
            background: var(--bg-surface);
            border: 1px solid var(--border-light);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 12px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .modal-input:focus { border-color: var(--accent); }
        .modal-input::placeholder { color: var(--text-muted); }

        .password-input-wrapper { position: relative; }

        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            font-size: 18px;
            background: none;
            border: none;
            padding: 0;
            line-height: 1;
        }

        .password-toggle:hover { color: var(--text-secondary); }

        .error-message {
            color: var(--error);
            font-size: 11px;
            min-height: 0;
        }

        .btn-primary {
            width: 100%;
            padding: 10px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            margin-top: 4px;
            box-shadow: 0 2px 10px rgba(255, 77, 0, 0.3);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 16px rgba(255, 77, 0, 0.4);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
            box-shadow: 0 1px 6px rgba(255, 77, 0, 0.2);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="onboarding-header">
            <img src="img/logo.jpeg" alt="VideoDB" class="brand-logo">
            <span class="brand-name">Async Recorder</span>
        </div>
        <div class="onboarding-subtitle">Enter your API key to start recording.</div>

        <div class="input-group">
            <label>Your Name</label>
            <input type="text" id="nameInput" class="modal-input" placeholder="e.g. John Doe">
        </div>

        <div class="input-group">
            <div class="label-row">
                <label>API Key</label>
                <a href="#" id="getApiKeyLink" class="label-link">Get API Key</a>
            </div>
            <div class="password-input-wrapper">
                <input type="password" id="apiKeyInput" class="modal-input" placeholder="sk-..." style="font-family: monospace;">
                <button id="toggleApiKey" class="password-toggle"><span class="material-icons">visibility</span></button>
            </div>
        </div>

        <div id="onboardingError" class="error-message"></div>
        <button id="connectBtn" class="btn-primary">Connect</button>
    </div>

    <script type="module">
        const nameInput = document.getElementById('nameInput');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const toggleApiKeyBtn = document.getElementById('toggleApiKey');
        const connectBtn = document.getElementById('connectBtn');
        const errorMsg = document.getElementById('onboardingError');
        const getApiKeyLink = document.getElementById('getApiKeyLink');

        // External link for API key
        if (getApiKeyLink) {
            getApiKeyLink.addEventListener('click', (e) => {
                e.preventDefault();
                window.configAPI.openExternalLink('https://console.videodb.io/dashboard');
            });
        }

        // Toggle API key visibility
        toggleApiKeyBtn.addEventListener('click', () => {
            const type = apiKeyInput.getAttribute('type') === 'password' ? 'text' : 'password';
            apiKeyInput.setAttribute('type', type);
            const icon = toggleApiKeyBtn.querySelector('.material-icons');
            if (icon) icon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });

        // Connect button
        connectBtn.addEventListener('click', async () => {
            const name = nameInput.value.trim();
            const apiKey = apiKeyInput.value.trim();

            if (!name) {
                errorMsg.textContent = 'Please enter your name.';
                return;
            }
            if (!apiKey) {
                errorMsg.textContent = 'Please enter a valid API Key.';
                return;
            }

            connectBtn.textContent = 'Connecting...';
            connectBtn.disabled = true;
            errorMsg.textContent = '';

            try {
                const result = await window.configAPI.register({ name, apiKey });

                if (result.success) {
                    window.recorderAPI.modalComplete({
                        type: 'onboarding',
                        success: true,
                        userName: result.userName
                    });
                } else {
                    errorMsg.textContent = result.error || 'Failed to connect.';
                    connectBtn.disabled = false;
                    connectBtn.textContent = 'Connect';
                }
            } catch (err) {
                console.error(err);
                errorMsg.textContent = 'An unexpected error occurred.';
                connectBtn.disabled = false;
                connectBtn.textContent = 'Connect';
            }
        });
    </script>
</body>

</html>
